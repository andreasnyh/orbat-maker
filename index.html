<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="description" content="Drag-and-drop ORBAT builder for milsim units" />
    <link rel="icon" type="image/svg+xml" href="icon-192.svg" />
    <title>ORBAT Maker</title>
    <script>
      // FOUC prevention: apply theme before first paint
      (() => {
        var t = localStorage.getItem('orbat-theme');
        if (t !== 'midnight' && t !== 'olive' && t !== 'sand') t = 'midnight';
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.style.colorScheme = t === 'sand' ? 'light' : 'dark';
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', t === 'midnight' ? '#1a1a2e' : t === 'olive' ? '#1e211a' : '#ffffff');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script data-goatcounter="https://andreasnyh.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
